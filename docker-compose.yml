# Long Tail Workflows
# Usage:  docker compose up
# Ports:  3000 (API), 5432 (Postgres), 4222/8222 (NATS)
# Adjust: Change the left side of any port mapping to resolve collisions
#         e.g. "5433:5432" to use host port 5433 for Postgres

services:
  long-tail:
    build:
      context: .
      target: development
    volumes:
      - .:/app
      - /app/node_modules
      - /app/dashboard/node_modules
    ports:
      - "${LT_PORT:-3000}:3000"
      - "9229:9229"
    environment:
      - NODE_ENV=development
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=longtail
      - NATS_URL=nats://nats:4222
      - NATS_TOKEN=dev_api_secret
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-lt-dev-secret}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
      - LT_LLM_MODEL_PRIMARY=${LT_LLM_MODEL_PRIMARY:-}
      - LT_LLM_MODEL_SECONDARY=${LT_LLM_MODEL_SECONDARY:-}
      - HMSH_TELEMETRY=${HMSH_TELEMETRY:-info}
      - HONEYCOMB_API_KEY=${HONEYCOMB_API_KEY:-}
      - HONEYCOMB_TEAM=${HONEYCOMB_TEAM:-}
      - HONEYCOMB_ENVIRONMENT=${HONEYCOMB_ENVIRONMENT:-}
      - HMSH_XCLAIM_DELAY_MS=180000
      - LT_STORAGE_BACKEND=s3
      - LT_S3_BUCKET=long-tail-files
      - LT_S3_ENDPOINT=http://minio:9000
      - LT_S3_REGION=us-east-1
      - LT_S3_ACCESS_KEY=minioadmin
      - LT_S3_SECRET_KEY=minioadmin
      - LT_S3_FORCE_PATH_STYLE=true
      - OAUTH_ENCRYPTION_KEY=${OAUTH_ENCRYPTION_KEY:-a01b2c3d4e5f60718293a4b5c6d7e8f90a1b2c3d4e5f60718293a4b5c6d7e8f9}
      - OAUTH_GOOGLE_CLIENT_ID=${OAUTH_GOOGLE_CLIENT_ID:-}
      - OAUTH_GOOGLE_CLIENT_SECRET=${OAUTH_GOOGLE_CLIENT_SECRET:-}
      - OAUTH_GITHUB_CLIENT_ID=${OAUTH_GITHUB_CLIENT_ID:-}
      - OAUTH_GITHUB_CLIENT_SECRET=${OAUTH_GITHUB_CLIENT_SECRET:-}
      - OAUTH_MOCK_CLIENT_ID=${OAUTH_MOCK_CLIENT_ID:-mock-client}
      - OAUTH_MOCK_CLIENT_SECRET=${OAUTH_MOCK_CLIENT_SECRET:-mock-secret}
      - MOCK_OAUTH_BROWSER_AUTH_URL=http://localhost:9080/authorize
      - MOCK_OAUTH_TOKEN_URL=http://mock-oauth:9080/token
      - MOCK_OAUTH_USERINFO_URL=http://mock-oauth:9080/userinfo
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      minio:
        condition: service_healthy
      mock-oauth:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: longtail
    ports:
      - "${LT_PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./docker/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  nats:
    image: nats:latest
    ports:
      - "${LT_NATS_PORT:-4222}:4222"
      - "${LT_NATS_MONITOR_PORT:-8222}:8222"
      - "${LT_NATS_WS_PORT:-9222}:9222"
    volumes:
      - ./nats.conf:/etc/nats/nats.conf
    command: ["-c", "/etc/nats/nats.conf", "-js"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "${LT_MINIO_PORT:-9000}:9000"
      - "${LT_MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  mock-oauth:
    build: ./tests/mock-oauth
    ports:
      - "${LT_MOCK_OAUTH_PORT:-9080}:9080"
    environment:
      - PORT=9080
      - MOCK_USERS=alice@test.local:Alice Test:test-user-1,bob@test.local:Bob Test:test-user-2
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:9080/health').then(r=>{if(!r.ok)throw 1})"]
      interval: 5s
      timeout: 3s
      retries: 5
volumes:
  pgdata:
  miniodata:
