port: 4222
http: 8222

websocket {
  port: 9222
  no_tls: true
  same_origin: false
}

# Authentication configuration
# Using token-based auth for both server publisher and dashboard clients
# In dev: uses hardcoded tokens
# In prod: set NATS_TOKEN env var in Doppler for API server
authorization {
  # Simple token auth - same token for dev simplicity
  # Server uses this token, dashboard uses this token
  # In production, you can use different tokens or user-based auth
  token: "dev_api_secret"
}
